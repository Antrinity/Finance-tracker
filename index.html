<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Finanzen"/>
<meta name="theme-color" content="#0F1117"/>
<title>Finanzen</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0F1117;color:#F1F5F9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overscroll-behavior:none}
input,select,button{font-family:inherit}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
::-webkit-scrollbar{display:none}
.page{display:none;animation:fadeIn .25s}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.sheet{position:fixed;inset:0;z-index:500}
.sheet-overlay{position:absolute;inset:0;background:rgba(0,0,0,.65)}
.sheet-body{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#1A1D27;border-radius:24px 24px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom,16px));animation:slideUp .3s;max-height:92vh;overflow-y:auto}
.sheet-handle{width:40px;height:4px;border-radius:2px;background:#2E3350;margin:0 auto 20px}
.card{background:#22263A;border-radius:16px;padding:16px;border:1px solid #2E3350}
.input-wrap{margin-bottom:14px}
.input-label{font-size:12px;color:#94A3B8;margin-bottom:5px;font-weight:600;display:block}
input.field,select.field{width:100%;padding:12px 14px;border-radius:12px;border:1px solid #2E3350;background:#1A1D27;color:#F1F5F9;font-size:15px;outline:none;appearance:none;-webkit-appearance:none}
input.field:focus,select.field:focus{border-color:#4F8EF7}
.btn{width:100%;padding:14px;border-radius:12px;border:none;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn:active{opacity:.8}
.btn-primary{background:#4F8EF7;color:#fff}
.btn-secondary{background:#22263A;color:#94A3B8}
.btn-sm{width:auto;padding:8px 16px;font-size:13px}
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#1A1D27;border-top:1px solid #2E3350;display:flex;padding-bottom:env(safe-area-inset-bottom,8px);z-index:200}
.tab-btn{flex:1;padding:10px 0;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
.tab-icon{font-size:20px}
.tab-label{font-size:10px;font-weight:600}
.fab{position:fixed;bottom:calc(72px + env(safe-area-inset-bottom,8px));right:20px;width:58px;height:58px;border-radius:50%;background:#4F8EF7;border:none;color:#fff;font-size:28px;cursor:pointer;box-shadow:0 4px 24px rgba(79,142,247,.45);display:flex;align-items:center;justify-content:center;z-index:100;transition:transform .15s}
.fab:active{transform:scale(.93)}
.toggle-wrap{display:flex;gap:10px;margin-bottom:20px}
.type-btn{flex:1;padding:12px;border-radius:12px;border:none;cursor:pointer;font-weight:700;font-size:14px;transition:all .2s}
.pill{padding:6px 14px;border-radius:20px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s}
.entry-row{display:flex;align-items:center;gap:12px;padding:14px 16px}
.entry-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.del-btn{background:none;border:none;font-size:18px;cursor:pointer;padding:4px;color:#6B7280;flex-shrink:0}
.del-btn:active{opacity:.6}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.toggle-switch{width:44px;height:26px;border-radius:13px;position:relative;cursor:pointer;flex-shrink:0;transition:background .2s}
.toggle-knob{position:absolute;top:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .2s}
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:20px;font-size:14px;font-weight:700;z-index:9999;animation:toastIn .2s;box-shadow:0 4px 20px rgba(0,0,0,.4);display:none;white-space:nowrap}
.month-scroll{display:flex;gap:8px;overflow-x:auto;padding:12px 20px 0}
.profile-scroll{display:flex;gap:8px;overflow-x:auto;padding:12px 20px 0}
.section-label{font-size:11px;color:#6B7280;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
.bar-row{margin-bottom:10px}
.bar-track{height:6px;border-radius:4px;background:#2E3350}
.bar-fill{height:6px;border-radius:4px;transition:width .4s}
.empty-state{text-align:center;padding:40px 20px;color:#6B7280}
.empty-icon{font-size:40px;margin-bottom:12px}
</style>
</head>
<body>

<div id="app" style="max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:90px">

  <!-- HEADER -->
  <div style="padding:20px 20px 0;display:flex;justify-content:space-between;align-items:center">
    <div>
      <div style="font-size:11px;color:#6B7280;font-weight:600;letter-spacing:1px;text-transform:uppercase">Finanzen</div>
      <div id="header-name" style="font-size:20px;font-weight:800"></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div id="sync-indicator" style="font-size:11px;color:#6B7280;display:none">Gespeichert ✓</div>
      <select id="year-dropdown" onchange="setYear(parseInt(this.value))" style="
        background:#22263A;color:#F1F5F9;border:1px solid #2E3350;
        border-radius:10px;padding:6px 10px;font-size:14px;font-weight:700;
        cursor:pointer;outline:none;appearance:none;-webkit-appearance:none;
        text-align:center;min-width:72px
      "></select>
      <div id="profile-avatar" style="width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff"></div>
    </div>
  </div>

  <!-- PROFILE SWITCHER -->
  <div class="profile-scroll" id="profile-switcher"></div>

  <!-- MONTH PICKER -->
  <div class="month-scroll" id="month-picker"></div>

  <!-- PAGES -->
  <div id="page-dashboard" class="page" style="padding:16px 20px"></div>
  <div id="page-entries" class="page" style="padding:16px 20px"></div>
  <div id="page-categories" class="page" style="padding:16px 20px"></div>
  <div id="page-recurring" class="page" style="padding:16px 20px"></div>
  <div id="page-profiles" class="page" style="padding:16px 20px"></div>
  <div id="page-categories-mgmt" class="page" style="padding:16px 20px"></div>

  <!-- FAB -->
  <button class="fab" id="fab" onclick="openAddEntry()">+</button>

  <!-- TAB BAR -->
  <div class="tab-bar">
    <button class="tab-btn" onclick="setTab('dashboard')">
      <span class="tab-icon">📊</span>
      <span class="tab-label" id="tlabel-dashboard" style="color:#4F8EF7">Übersicht</span>
    </button>
    <button class="tab-btn" onclick="setTab('entries')">
      <span class="tab-icon">📋</span>
      <span class="tab-label" id="tlabel-entries" style="color:#6B7280">Einträge</span>
    </button>
    <button class="tab-btn" onclick="setTab('categories')">
      <span class="tab-icon">🍩</span>
      <span class="tab-label" id="tlabel-categories" style="color:#6B7280">Kategorien</span>
    </button>
    <button class="tab-btn" onclick="setTab('recurring')">
      <span class="tab-icon">🔁</span>
      <span class="tab-label" id="tlabel-recurring" style="color:#6B7280">Fix</span>
    </button>
    <button class="tab-btn" onclick="setTab('profiles')">
      <span class="tab-icon">👤</span>
      <span class="tab-label" id="tlabel-profiles" style="color:#6B7280">Profile</span>
    </button>
  </div>
</div>

<!-- ADD ENTRY SHEET -->
<div class="sheet" id="sheet-entry" style="display:none">
  <div class="sheet-overlay" onclick="closeSheet('sheet-entry')"></div>
  <div class="sheet-body">
    <div class="sheet-handle"></div>
    <div style="font-size:18px;font-weight:800;margin-bottom:20px">Neuer Eintrag</div>
    <div class="toggle-wrap">
      <button class="type-btn" id="btn-expense" onclick="setEntryType('expense')">− Ausgabe</button>
      <button class="type-btn" id="btn-income" onclick="setEntryType('income')">+ Einnahme</button>
    </div>
    <div class="input-wrap">
      <label class="input-label">Bezeichnung</label>
      <input class="field" id="f-name" type="text" placeholder="z.B. Spotify, Gehalt Juni"/>
    </div>
    <div class="input-wrap">
      <label class="input-label">Betrag (€)</label>
      <input class="field" id="f-amount" type="number" inputmode="decimal" placeholder="0.00"/>
    </div>
    <div class="input-wrap">
      <label class="input-label">Kategorie</label>
      <select class="field" id="f-category"></select>
    </div>
    <div class="input-wrap">
      <label class="input-label">Datum</label>
      <input class="field" id="f-date" type="date"/>
    </div>
    <div class="input-wrap" style="display:flex;align-items:center;gap:12px">
      <div class="toggle-switch" id="toggle-recurring" onclick="toggleRecurring()" style="background:#2E3350">
        <div class="toggle-knob" id="toggle-knob" style="left:3px"></div>
      </div>
      <span style="font-size:14px;color:#F1F5F9">Wiederkehrend</span>
    </div>
    <div id="interval-wrap" class="input-wrap" style="display:none">
      <label class="input-label">Intervall</label>
      <select class="field" id="f-interval">
        <option value="monthly">Monatlich</option>
        <option value="yearly">Jährlich</option>
      </select>
    </div>
    <div class="input-wrap">
      <label class="input-label">Notiz (optional)</label>
      <input class="field" id="f-note" type="text" placeholder="z.B. läuft bis Dez 2026"/>
    </div>
    <button class="btn btn-primary" onclick="saveEntry()" style="margin-bottom:10px">Speichern</button>
    <button class="btn btn-secondary" onclick="closeSheet('sheet-entry')">Abbrechen</button>
  </div>
</div>

<!-- ADD PROFILE SHEET -->
<div class="sheet" id="sheet-profile" style="display:none">
  <div class="sheet-overlay" onclick="closeSheet('sheet-profile')"></div>
  <div class="sheet-body">
    <div class="sheet-handle"></div>
    <div style="font-size:18px;font-weight:800;margin-bottom:20px">Neues Profil</div>
    <div class="input-wrap">
      <label class="input-label">Name</label>
      <input class="field" id="p-name" type="text" placeholder="z.B. Partner, Haushalt, Baby"/>
    </div>
    <button class="btn btn-primary" onclick="saveProfile()" style="margin-bottom:10px">Erstellen</button>
    <button class="btn btn-secondary" onclick="closeSheet('sheet-profile')">Abbrechen</button>
  </div>
</div>

<!-- EDIT PROFILE SHEET -->
<div class="sheet" id="sheet-edit-profile" style="display:none">
  <div class="sheet-overlay" onclick="closeSheet('sheet-edit-profile')"></div>
  <div class="sheet-body">
    <div class="sheet-handle"></div>
    <div style="font-size:18px;font-weight:800;margin-bottom:20px">Profil umbenennen</div>
    <input type="hidden" id="ep-index"/>
    <div class="input-wrap">
      <label class="input-label">Name</label>
      <input class="field" id="ep-name" type="text" placeholder="z.B. Sarah, Haushalt"/>
    </div>
    <button class="btn btn-primary" onclick="saveEditProfile()" style="margin-bottom:10px">Speichern</button>
    <button class="btn btn-secondary" onclick="closeSheet('sheet-edit-profile')">Abbrechen</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ── Constants ─────────────────────────────────────────────────
const COLORS = {
  bg:'#0F1117',surface:'#1A1D27',card:'#22263A',border:'#2E3350',
  accent:'#4F8EF7',green:'#34D399',red:'#F87171',yellow:'#FBBF24',
  muted:'#6B7280',text:'#F1F5F9',subtext:'#94A3B8'
};
const PROFILE_COLORS = ['#4F8EF7','#A78BFA','#34D399','#FBBF24','#F87171','#38BDF8','#FB923C'];
const DEFAULT_CATEGORIES = {
  income:['Gehalt','Bonus','Kindergeld','Nebeneinkommen','Sonstiges'],
  expense:['Miete','Nebenkosten','Lebensmittel','Abonnements','Versicherung','Mobilität','Gesundheit','Freizeit','Kleidung','Baby','Sonstiges']
};
let CATEGORIES = {income:[...DEFAULT_CATEGORIES.income], expense:[...DEFAULT_CATEGORIES.expense]};
function loadCustomCategories() {
  try {
    const raw = localStorage.getItem('finanztracker_cats');
    if(raw) CATEGORIES = JSON.parse(raw);
  } catch(e){}
}
function saveCustomCategories() {
  localStorage.setItem('finanztracker_cats', JSON.stringify(CATEGORIES));
}
const ICONS = {
  'Gehalt':'💼','Bonus':'🎁','Kindergeld':'👶','Nebeneinkommen':'💡','Sonstiges':'📦',
  'Miete':'🏠','Nebenkosten':'💡','Lebensmittel':'🛒','Abonnements':'📱','Versicherung':'🛡️',
  'Mobilität':'🚗','Gesundheit':'❤️','Freizeit':'🎉','Kleidung':'👕','Baby':'🍼'
};
const fmt = n => new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR'}).format(n||0);
const today = () => new Date().toISOString().split('T')[0];

// ── State ─────────────────────────────────────────────────────
let state = {profiles:[], activeProfile:0, tab:'dashboard', filterMonth:'', filterYear:2026, filterType:'all', entryType:'expense', recurring:false, newCatType:'expense'};

// ── Storage ───────────────────────────────────────────────────
function load() {
  try {
    const raw = localStorage.getItem('finanztracker_v2');
    if (raw) return JSON.parse(raw);
  } catch(e){}
  return null;
}
function save() {
  try {
    localStorage.setItem('finanztracker_v2', JSON.stringify(state.profiles));
    showSyncIndicator();
  } catch(e){ showToast('Speichern fehlgeschlagen',COLORS.red); }
}

function showSyncIndicator() {
  const el = document.getElementById('sync-indicator');
  if(!el) return;
  el.style.display='block';
  setTimeout(()=>el.style.display='none', 1800);
}

// ── Init ──────────────────────────────────────────────────────
function init() {
  loadCustomCategories();
  const saved = load();
  if (saved && saved.length) {
    state.profiles = saved;
  } else {
    state.profiles = [{id:'p1',name:'Name',color:PROFILE_COLORS[0],entries:[]}];
    save();
  }
  // Set current month
  state.filterYear = parseInt(today().slice(0,4));
  state.filterMonth = today().slice(0,7);
  renderAll();
}

// ── Render ────────────────────────────────────────────────────
function renderAll() {
  renderHeader();
  renderProfileSwitcher();
  renderYearPicker();
  renderMonthPicker();
  renderCurrentPage();
}

function renderHeader() {
  const p = currentProfile();
  document.getElementById('header-name').textContent = p.name;
  const av = document.getElementById('profile-avatar');
  av.style.background = p.color;
  av.textContent = p.name[0].toUpperCase();
}

function renderProfileSwitcher() {
  const el = document.getElementById('profile-switcher');
  el.innerHTML = state.profiles.map((p,i)=>`
    <button onclick="switchProfile(${i})" style="
      padding:6px 14px;border-radius:20px;border:none;cursor:pointer;
      font-size:13px;font-weight:700;white-space:nowrap;
      background:${state.activeProfile===i?p.color:COLORS.card};
      color:${state.activeProfile===i?'#fff':COLORS.subtext}
    ">${p.name}</button>
  `).join('') + `
    <button onclick="openAddProfile()" style="
      padding:6px 14px;border-radius:20px;border:1px dashed ${COLORS.border};
      background:transparent;color:${COLORS.muted};font-size:13px;cursor:pointer;white-space:nowrap
    ">+ Neu</button>
  `;
}

function renderYearPicker() {
  const el = document.getElementById('year-dropdown');
  if(!el) return;
  const years = [2024,2025,2026,2027,2028,2029,2030];
  el.innerHTML = years.map(y=>`<option value="${y}" ${state.filterYear===y?'selected':''}>${y}</option>`).join('');
}

function renderMonthPicker() {
  const el = document.getElementById('month-picker');
  const months = ['01','02','03','04','05','06','07','08','09','10','11','12'];
  const labels = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
  el.innerHTML = months.map((m,i)=>{
    const key = `${state.filterYear}-${m}`;
    const active = state.filterMonth===key;
    return `<button onclick="setMonth('${key}')" style="
      padding:5px 12px;border-radius:20px;border:none;cursor:pointer;
      font-size:12px;font-weight:600;white-space:nowrap;
      background:${active?COLORS.accent+'33':COLORS.card};
      color:${active?COLORS.accent:COLORS.subtext}
    ">${labels[i]}</button>`;
  }).join('');
}

function renderCurrentPage() {
  ['dashboard','entries','categories','recurring','profiles','categories-mgmt'].forEach(t=>{
    const page = document.getElementById('page-'+t);
    const label = document.getElementById('tlabel-'+t);
    if(page) page.classList.toggle('active', t===state.tab);
    if(label) label.style.color = t===state.tab ? COLORS.accent : COLORS.muted;
  });
  const fab = document.getElementById('fab');
  fab.style.display = (state.tab==='profiles'||state.tab==='categories'||state.tab==='categories-mgmt') ? 'none' : 'flex';

  if(state.tab==='dashboard') renderDashboard();
  else if(state.tab==='entries') renderEntries();
  else if(state.tab==='categories') renderCategories();
  else if(state.tab==='recurring') renderRecurring();
  else if(state.tab==='profiles') renderProfiles();
  else if(state.tab==='categories-mgmt') renderCategoriesMgmt();
}

// ── Dashboard ─────────────────────────────────────────────────
function renderDashboard() {
  const el = document.getElementById('page-dashboard');
  const p = currentProfile();
  const monthEntries = p.entries.filter(e=>e.date.startsWith(state.filterMonth));
  const income = monthEntries.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
  const expense = monthEntries.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);
  const balance = income - expense;
  const savingsRate = income > 0 ? Math.max(0,(income-expense)/income*100) : 0;

  const allRec = p.entries.filter(e=>e.recurring);
  const recInc = allRec.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
  const recExp = allRec.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);

  // Category breakdown
  const cats = {};
  monthEntries.filter(e=>e.type==='expense').forEach(e=>{cats[e.category]=(cats[e.category]||0)+e.amount});
  const topCats = Object.entries(cats).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxCat = topCats[0]?.[1]||1;

  el.innerHTML = `
    <!-- Donut -->
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:16px">
        ${donutSVG(income,expense,balance)}
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
            <div style="width:10px;height:10px;border-radius:50%;background:${COLORS.green}"></div>
            <div>
              <div style="font-size:11px;color:${COLORS.subtext}">Einnahmen</div>
              <div style="font-size:18px;font-weight:700;color:${COLORS.green}">${fmt(income)}</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <div style="width:10px;height:10px;border-radius:50%;background:${COLORS.red}"></div>
            <div>
              <div style="font-size:11px;color:${COLORS.subtext}">Ausgaben</div>
              <div style="font-size:18px;font-weight:700;color:${COLORS.red}">${fmt(expense)}</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Savings rate -->
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:13px;color:${COLORS.subtext};font-weight:600">SPARQUOTE</span>
        <span style="font-size:13px;font-weight:700;color:${COLORS.yellow}">${savingsRate.toFixed(1)}%</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${Math.min(100,savingsRate)}%;background:${COLORS.yellow}"></div>
      </div>
    </div>

    <!-- Top Ausgaben -->
    <div class="card" style="margin-bottom:16px">
      <div class="section-label">Top Ausgaben</div>
      ${topCats.length===0
        ? `<div style="color:${COLORS.muted};font-size:13px">Keine Ausgaben diesen Monat</div>`
        : topCats.map(([cat,amt])=>`
          <div class="bar-row">
            <div style="display:flex;justify-content:space-between;margin-bottom:4px">
              <span style="font-size:13px">${ICONS[cat]||'•'} ${cat}</span>
              <span style="font-size:13px;font-weight:700;color:${COLORS.red}">${fmt(amt)}</span>
            </div>
            <div class="bar-track">
              <div class="bar-fill" style="width:${(amt/maxCat*100).toFixed(1)}%;background:${COLORS.red}"></div>
            </div>
          </div>
        `).join('')
      }
    </div>

    <!-- Fixkosten -->
    <div class="card">
      <div class="section-label">Fixkosten Übersicht</div>
      <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid ${COLORS.border}">
        <span style="font-size:14px">🔄 Monatl. Einnahmen</span>
        <span style="font-size:14px;font-weight:700;color:${COLORS.green}">${fmt(recInc)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid ${COLORS.border}">
        <span style="font-size:14px">🔄 Monatl. Ausgaben</span>
        <span style="font-size:14px;font-weight:700;color:${COLORS.red}">${fmt(recExp)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:10px 0">

      </div>
    </div>
  `;
}

function donutSVG(income, expense, balance) {
  const total = income + expense || 1;
  const r=54, cx=70, cy=70, sw=14;
  const circ = 2*Math.PI*r;
  const incDash = (income/total)*circ;
  const balColor = balance>=0 ? COLORS.green : COLORS.red;
  const balText = (balance>=0?'+':'')+fmt(balance).replace('€','')+'€';
  return `
    <svg width="140" height="140">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${COLORS.border}" stroke-width="${sw}"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${COLORS.green}" stroke-width="${sw}"
        stroke-dasharray="${incDash} ${circ}" stroke-linecap="round"
        transform="rotate(-90 ${cx} ${cy})"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${COLORS.red}" stroke-width="${sw}"
        stroke-dasharray="${circ-incDash} ${circ}" stroke-dashoffset="${-incDash}"
        stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})"/>
      <text x="${cx}" y="${cy-6}" text-anchor="middle" fill="${balColor}" font-size="12" font-weight="700" font-family="-apple-system,sans-serif">${balText}</text>
      <text x="${cx}" y="${cy+10}" text-anchor="middle" fill="${COLORS.subtext}" font-size="10" font-family="-apple-system,sans-serif">Bilanz</text>
    </svg>`;
}

// ── Categories ────────────────────────────────────────────────
function renderCategories() {
  const el = document.getElementById('page-categories');
  const p = currentProfile();
  const monthEntries = p.entries.filter(e=>e.date.startsWith(state.filterMonth));
  const expEntries = monthEntries.filter(e=>e.type==='expense');
  const incEntries = monthEntries.filter(e=>e.type==='income');
  const totalExp = expEntries.reduce((s,e)=>s+e.amount,0);
  const totalInc = incEntries.reduce((s,e)=>s+e.amount,0);

  // Build category maps
  const expCats = {};
  expEntries.forEach(e=>{expCats[e.category]=(expCats[e.category]||0)+e.amount});
  const incCats = {};
  incEntries.forEach(e=>{incCats[e.category]=(incCats[e.category]||0)+e.amount});

  const expSorted = Object.entries(expCats).sort((a,b)=>b[1]-a[1]);
  const incSorted = Object.entries(incCats).sort((a,b)=>b[1]-a[1]);

  // Donut for expenses by category
  const CAT_COLORS_EXP = ['#F87171','#FB923C','#FBBF24','#E879F9','#F472B6','#C084FC','#FF6B6B','#FFA94D','#FFD43B','#DA77F2','#F783AC'];
  const CAT_COLORS_INC = ['#34D399','#38BDF8','#60A5FA','#4ADE80','#2DD4BF','#818CF8','#A3E635','#22D3EE','#7DD3FC','#6EE7B7','#93C5FD'];

  function catDonut(entries_sorted, total, label, colors) {
    if(!entries_sorted.length) return '<div style="color:#6B7280;font-size:13px;padding:12px 0">Keine Einträge</div>';
    const r=50,cx=65,cy=65,sw=16;
    const circ=2*Math.PI*r;
    let offset=0;
    let segments='';
    entries_sorted.forEach(([cat,amt],i)=>{
      const pct=amt/total;
      const dash=pct*circ;
      segments+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${colors[i%colors.length]}" stroke-width="${sw}"
        stroke-dasharray="${dash-1} ${circ}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cy})"/>`;
      offset+=dash;
    });
    return `
      <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
        <svg width="130" height="130" style="flex-shrink:0">
          <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#2E3350" stroke-width="${sw}"/>
          ${segments}
          <text x="${cx}" y="${cy-5}" text-anchor="middle" fill="#F1F5F9" font-size="13" font-weight="700" font-family="-apple-system,sans-serif">${fmt(total).replace(' €','')}</text>
          <text x="${cx}" y="${cy+12}" text-anchor="middle" fill="#94A3B8" font-size="10" font-family="-apple-system,sans-serif">${label}</text>
        </svg>
        <div style="flex:1;min-width:140px">
          ${entries_sorted.slice(0,5).map(([cat,amt],i)=>`
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
              <div style="width:10px;height:10px;border-radius:50%;background:${colors[i%colors.length]};flex-shrink:0"></div>
              <div style="flex:1;min-width:0">
                <div style="font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${ICONS[cat]||'•'} ${cat}</div>
                <div style="font-size:11px;color:#94A3B8">${((amt/total)*100).toFixed(0)}% · ${fmt(amt)}</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>`;
  }

  // Full bar list
  function catBars(sorted, total, color, colors) {
    if(!sorted.length) return '<div style="color:#6B7280;font-size:13px">Keine Einträge</div>';
    return sorted.map(([cat,amt],i)=>`
      <div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;margin-bottom:5px;align-items:center">
          <span style="font-size:13px;display:flex;align-items:center;gap:6px">
            <span style="width:8px;height:8px;border-radius:50%;background:${colors[i%colors.length]};display:inline-block"></span>
            ${ICONS[cat]||'•'} ${cat}
          </span>
          <span style="font-size:13px;font-weight:700;color:${color}">${fmt(amt)} <span style="font-size:11px;color:#6B7280;font-weight:400">(${((amt/total)*100).toFixed(0)}%)</span></span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${((amt/total)*100).toFixed(1)}%;background:${colors[i%colors.length]}"></div>
        </div>
      </div>
    `).join('');
  }

  el.innerHTML = `
    <div class="card" style="margin-bottom:16px">
      <div class="section-label">Ausgaben nach Kategorie</div>
      ${catDonut(expSorted, totalExp||1, 'Ausgaben', CAT_COLORS_EXP)}
    </div>
    <div class="card" style="margin-bottom:16px">
      <div class="section-label">Alle Ausgaben im Detail</div>
      ${catBars(expSorted, totalExp||1, COLORS.red, CAT_COLORS_EXP)}
    </div>
    ${incSorted.length>0?`
    <div class="card" style="margin-bottom:16px">
      <div class="section-label">Einnahmen nach Kategorie</div>
      ${catDonut(incSorted, totalInc||1, 'Einnahmen', CAT_COLORS_INC)}
    </div>
    <div class="card">
      <div class="section-label">Alle Einnahmen im Detail</div>
      ${catBars(incSorted, totalInc||1, COLORS.green, CAT_COLORS_INC)}
    </div>`:''}
  `;
}

      <div style="display:flex;gap:10px;margin-bottom:12px">
        <button onclick="setCatType('expense')" id="ctype-expense" style="flex:1;padding:10px;border-radius:10px;border:none;cursor:pointer;font-weight:700;font-size:13px;background:${COLORS.red}33;color:${COLORS.red}">Ausgabe</button>
        <button onclick="setCatType('income')" id="ctype-income" style="flex:1;padding:10px;border-radius:10px;border:none;cursor:pointer;font-weight:700;font-size:13px;background:${COLORS.card};color:${COLORS.subtext}">Einnahme</button>
      </div>
      <div style="display:flex;gap:10px">
        <input class="field" id="new-cat-name" type="text" placeholder="Kategoriename..." style="flex:1;margin:0"/>
        <button onclick="addCustomCategory()" style="background:${COLORS.accent};color:#fff;border:none;border-radius:12px;padding:12px 16px;font-size:15px;font-weight:700;cursor:pointer;white-space:nowrap">+ Hinzufügen</button>
      </div>
    </div>

    <div class="card" style="margin-bottom:16px">
      <div class="section-label">Ausgabe-Kategorien</div>
      ${renderList('expense')}

    <div class="card">
      <div class="section-label">Einnahme-Kategorien</div>
      ${renderList('income')}

  // Set active type button style
  setCatTypeVisual(state.newCatType||'expense');
}

function setCatType(type) {
  state.newCatType = type;
  setCatTypeVisual(type);
}

function setCatTypeVisual(type) {
  const expBtn = document.getElementById('ctype-expense');
  const incBtn = document.getElementById('ctype-income');
  if(!expBtn||!incBtn) return;
  expBtn.style.background = type==='expense' ? COLORS.red+'33' : COLORS.card;
  expBtn.style.color = type==='expense' ? COLORS.red : COLORS.subtext;
  incBtn.style.background = type==='income' ? COLORS.green+'33' : COLORS.card;
  incBtn.style.color = type==='income' ? COLORS.green : COLORS.subtext;
}

function addCustomCategory() {
  const name = document.getElementById('new-cat-name').value.trim();
  if(!name) { showToast('Bitte Name eingeben', COLORS.red); return; }
  const type = state.newCatType || 'expense';
  if(CATEGORIES[type].includes(name)) { showToast('Kategorie existiert bereits', COLORS.yellow); return; }
  CATEGORIES[type].push(name);
  saveCustomCategories();
  document.getElementById('new-cat-name').value='';
  showToast(`"${name}" hinzugefügt ✓`);
  renderCategoriesMgmt();
}

function deleteCustomCategory(type, name) {
  showConfirm(`Kategorie "${name}" löschen?`, () => {
    CATEGORIES[type] = CATEGORIES[type].filter(c=>c!==name);
    saveCustomCategories();
    showToast(`"${name}" gelöscht`, COLORS.yellow);
    renderCategoriesMgmt();
  });
}

// ── Delete profile ────────────────────────────────────────────
function deleteProfile(i) {
  if(state.profiles.length<=1){ showToast('Letztes Profil kann nicht gelöscht werden', COLORS.red); return; }
  const name = state.profiles[i].name;
  showConfirm(`Profil "${name}" und alle ${state.profiles[i].entries.length} Einträge löschen?`, () => {
    state.profiles.splice(i,1);
    if(state.activeProfile>=state.profiles.length) state.activeProfile=state.profiles.length-1;
    save();
    showToast(`Profil "${name}" gelöscht`, COLORS.yellow);
    renderAll();
  });
}

// ── Entry form ────────────────────────────────────────────────
function openAddEntry() {
  state.entryType = 'expense';
  state.recurring = false;
  document.getElementById('f-name').value='';
  document.getElementById('f-amount').value='';
  document.getElementById('f-date').value=today();
  document.getElementById('f-note').value='';
  const iw = document.getElementById('interval-wrap');
  const tr = document.getElementById('toggle-recurring');
  const tk = document.getElementById('toggle-knob');
  if(iw) iw.style.display='none';
  if(tr) tr.style.background=COLORS.border;
  if(tk) tk.style.left='3px';
  updateTypeButtons();
  updateCategoryOptions();
  const _ssheetentry = document.getElementById('sheet-entry'); if(_ssheetentry) _ssheetentry.style.display='block';
}

function setEntryType(t) {
  state.entryType = t;
  updateTypeButtons();
  updateCategoryOptions();
}

function updateTypeButtons() {
  const isExp = state.entryType==='expense';
  const btnExp = document.getElementById('btn-expense');
  const btnInc = document.getElementById('btn-income');
  if(!btnExp||!btnInc) return;
  btnExp.style.background = isExp ? COLORS.red+'33' : COLORS.card;
  btnExp.style.color = isExp ? COLORS.red : COLORS.subtext;
  btnInc.style.background = !isExp ? COLORS.green+'33' : COLORS.card;
  btnInc.style.color = !isExp ? COLORS.green : COLORS.subtext;
}

function updateCategoryOptions() {
  const sel = document.getElementById('f-category');
  sel.innerHTML = CATEGORIES[state.entryType].map(c=>`<option value="${c}">${ICONS[c]||'•'} ${c}</option>`).join('');
}

function toggleRecurring() {
  state.recurring = !state.recurring;
  const tog = document.getElementById('toggle-recurring');
  const knob = document.getElementById('toggle-knob');
  const wrap = document.getElementById('interval-wrap');
  if(tog) tog.style.background = state.recurring ? COLORS.accent : COLORS.border;
  if(knob) knob.style.left = state.recurring ? '20px' : '3px';
  if(wrap) wrap.style.display = state.recurring ? 'block' : 'none';
}

function saveEntry() {
  const name = document.getElementById('f-name').value.trim();
  const amount = parseFloat(document.getElementById('f-amount').value);
  if(!name || isNaN(amount) || amount<=0) { showToast('Bitte Name und Betrag angeben', COLORS.red); return; }
  const entry = {
    id: Date.now().toString(),
    type: state.entryType,
    category: document.getElementById('f-category').value,
    name, amount,
    date: document.getElementById('f-date').value || today(),
    recurring: state.recurring,
    interval: document.getElementById('f-interval').value,
    note: document.getElementById('f-note').value.trim()
  };
  const idx = state.activeProfile;
  state.profiles[idx].entries.push(entry);
  save();
  closeSheet('sheet-entry');
  showToast('Eintrag gespeichert ✓');
  renderAll();
}

function deleteEntry(id) {
  showConfirm('Eintrag löschen?', () => {
    const idx = state.activeProfile;
    state.profiles[idx].entries = state.profiles[idx].entries.filter(e=>e.id!==id);
    save();
    renderCurrentPage();
    showToast('Gelöscht', COLORS.yellow);
  });
}

function openEditProfile(i) {
  document.getElementById('ep-index').value = i;
  document.getElementById('ep-name').value = state.profiles[i].name;
  const _ssheeteditprofile = document.getElementById('sheet-edit-profile'); if(_ssheeteditprofile) _ssheeteditprofile.style.display='block';
}

function saveEditProfile() {
  const i = parseInt(document.getElementById('ep-index').value);
  const name = document.getElementById('ep-name').value.trim();
  if(!name) { showToast('Bitte Name eingeben', COLORS.red); return; }
  state.profiles[i].name = name;
  save();
  closeSheet('sheet-edit-profile');
  showToast('Name geändert ✓');
  renderAll();
}

// ── Profile form ──────────────────────────────────────────────
function openAddProfile() {
  document.getElementById('p-name').value='';
  const _ssheetprofile = document.getElementById('sheet-profile'); if(_ssheetprofile) _ssheetprofile.style.display='block';
}

function saveProfile() {
  const name = document.getElementById('p-name').value.trim();
  if(!name) { showToast('Bitte Name eingeben', COLORS.red); return; }
  const color = PROFILE_COLORS[state.profiles.length % PROFILE_COLORS.length];
  state.profiles.push({id:Date.now().toString(), name, color, entries:[]});
  state.activeProfile = state.profiles.length-1;
  save();
  closeSheet('sheet-profile');
  showToast(`Profil "${name}" erstellt ✓`);
  renderAll();
}

// ── Export ────────────────────────────────────────────────────
function exportData() {
  const blob = new Blob([JSON.stringify(state.profiles,null,2)],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='finanzen-export.json'; a.click();
  URL.revokeObjectURL(url);
  showToast('Export erfolgreich ✓');
}

// ── Helpers ───────────────────────────────────────────────────
function closeSheet(id) {
  const el = document.getElementById(id);
  if(el) el.style.display='none';
}


// ── Confirm dialog ────────────────────────────────────────────
function showConfirm(msg, onConfirm) {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9000;display:flex;align-items:center;justify-content:center;padding:20px';
  overlay.innerHTML = `
    <div style="background:#1A1D27;border-radius:20px;padding:24px;width:100%;max-width:320px;border:1px solid #2E3350">
      <div style="font-size:16px;font-weight:700;color:#F1F5F9;margin-bottom:20px;text-align:center">${msg}</div>
      <div style="display:flex;gap:10px">
        <button id="confirm-cancel" style="flex:1;padding:12px;border-radius:12px;border:none;background:#22263A;color:#94A3B8;font-size:15px;font-weight:700;cursor:pointer">Abbrechen</button>
        <button id="confirm-ok" style="flex:1;padding:12px;border-radius:12px;border:none;background:#F87171;color:#fff;font-size:15px;font-weight:700;cursor:pointer">Löschen</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#confirm-cancel').onclick = () => document.body.removeChild(overlay);
  overlay.querySelector('#confirm-ok').onclick = () => { document.body.removeChild(overlay); onConfirm(); };
}

let toastTimer;
function showToast(msg, color=COLORS.green) {
  const el = document.getElementById('toast');
  el.textContent=msg; el.style.background=color; el.style.display='block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.style.display='none', 2200);
}

// ── PWA Service Worker ────────────────────────────────────────
if('serviceWorker' in navigator) {
  const sw = `
    const CACHE='finanz-v1';
    self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll([self.location.pathname]))));
    self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));
  `;
  const blob = new Blob([sw],{type:'text/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}

// ── Start ─────────────────────────────────────────────────────
init();
</script>
