<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Budget"/>
<meta name="theme-color" content="#0A0C12"/>
<title>Budget</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0A0C12;color:#F1F5F9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overscroll-behavior:none}
input,select,button,textarea{font-family:inherit}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
::-webkit-scrollbar{display:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.page{display:none}.page.active{display:block;animation:fadeIn .2s}
.card{background:#161923;border-radius:16px;padding:16px;border:1px solid #1E2235}
.card-flat{background:#161923;border-radius:12px;padding:14px 16px;border:1px solid #1E2235}
.sheet{position:fixed;inset:0;z-index:500}
.sheet-overlay{position:absolute;inset:0;background:rgba(0,0,0,.7)}
.sheet-body{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#161923;border-radius:24px 24px 0 0;padding:20px 20px calc(24px + env(safe-area-inset-bottom,16px));animation:slideUp .28s;max-height:94vh;overflow-y:auto}
.handle{width:36px;height:4px;border-radius:2px;background:#2A2F45;margin:0 auto 20px}
.field{width:100%;padding:12px 14px;border-radius:12px;border:1px solid #2A2F45;background:#0A0C12;color:#F1F5F9;font-size:15px;outline:none;appearance:none;-webkit-appearance:none}
.field:focus{border-color:#5B8AF0}
.flabel{font-size:11px;color:#6B7A99;font-weight:700;letter-spacing:.5px;text-transform:uppercase;display:block;margin-bottom:6px}
.fwrap{margin-bottom:16px}
.btn{width:100%;padding:14px;border-radius:13px;border:none;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn:active{opacity:.8}
.btn-p{background:#5B8AF0;color:#fff}
.btn-s{background:#1E2235;color:#6B7A99}
.btn-d{background:rgba(248,113,113,.15);color:#F87171}
.btn-sm{width:auto;padding:7px 14px;font-size:13px;border-radius:10px}
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#0F1118;border-top:1px solid #1E2235;display:grid;grid-template-columns:repeat(4,1fr);padding-bottom:env(safe-area-inset-bottom,6px);z-index:200}
.tbb{padding:9px 0;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
.tbi{font-size:19px}
.tbl{font-size:9px;font-weight:700;letter-spacing:.3px}
.fab{position:fixed;bottom:calc(68px + env(safe-area-inset-bottom,6px));right:18px;width:54px;height:54px;border-radius:50%;background:#5B8AF0;border:none;color:#fff;font-size:26px;cursor:pointer;box-shadow:0 4px 20px rgba(91,138,240,.5);display:flex;align-items:center;justify-content:center;z-index:100;transition:transform .15s}
.fab:active{transform:scale(.92)}
.slabel{font-size:10px;color:#4A5270;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:7px;font-size:11px;font-weight:700}
.chip-row{display:flex;gap:8px;overflow-x:auto;padding:0}
.chip{padding:6px 14px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-weight:700;white-space:nowrap;transition:all .15s}
.type-toggle{display:flex;background:#0A0C12;border-radius:12px;padding:3px;margin-bottom:18px}
.type-btn{flex:1;padding:10px;border-radius:10px;border:none;cursor:pointer;font-weight:700;font-size:14px;transition:all .2s;background:transparent;color:#4A5270}
.type-btn.active-inc{background:rgba(52,211,153,.15);color:#34D399}
.type-btn.active-exp{background:rgba(248,113,113,.15);color:#F87171}
.tog-wrap{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.tog{width:44px;height:26px;border-radius:13px;position:relative;cursor:pointer;flex-shrink:0;transition:background .2s}
.tog-k{position:absolute;top:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .2s}
#toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);padding:10px 18px;border-radius:18px;font-size:13px;font-weight:700;z-index:9999;animation:toastIn .2s;box-shadow:0 4px 16px rgba(0,0,0,.5);display:none;white-space:nowrap}
.empty{text-align:center;padding:48px 20px;color:#4A5270}
.empty-i{font-size:36px;margin-bottom:10px}
.row-scroll{display:flex;gap:8px;overflow-x:auto;padding:10px 20px 0}
.divider{height:1px;background:#1E2235;margin:2px 0}
</style>
</head>
<body>
<div id="app" style="max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:86px">

  <!-- HEADER -->
  <div style="padding:20px 20px 0;display:flex;justify-content:space-between;align-items:center">
    <div>
      <div style="font-size:10px;color:#4A5270;font-weight:700;letter-spacing:1.5px;text-transform:uppercase">Budget</div>
      <div id="hdr-name" style="font-size:22px;font-weight:800;letter-spacing:-.3px"></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <select id="year-sel" onchange="setYear(+this.value)" style="background:#161923;color:#F1F5F9;border:1px solid #2A2F45;border-radius:10px;padding:6px 10px;font-size:14px;font-weight:700;cursor:pointer;outline:none;appearance:none;-webkit-appearance:none;min-width:68px;text-align:center"></select>
      <div id="hdr-av" style="width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;flex-shrink:0"></div>
    </div>
  </div>

  <!-- PROFILE ROW -->
  <div class="row-scroll" id="prof-row"></div>
  <!-- MONTH ROW -->
  <div class="row-scroll" id="month-row"></div>

  <!-- PAGES -->
  <div id="pg-dashboard" class="page" style="padding:14px 20px"></div>
  <div id="pg-entries"   class="page" style="padding:14px 20px"></div>
  <div id="pg-analytics" class="page" style="padding:14px 20px"></div>
  <div id="pg-settings"  class="page" style="padding:14px 20px"></div>

  <!-- FAB -->
  <button class="fab" id="fab" onclick="openSheet('add')">+</button>

  <!-- TAB BAR -->
  <div class="tab-bar">
    <button class="tbb" onclick="goTab('dashboard')"><span class="tbi">📊</span><span class="tbl" id="tl-dashboard" style="color:#5B8AF0">Übersicht</span></button>
    <button class="tbb" onclick="goTab('entries')"><span class="tbi">📋</span><span class="tbl" id="tl-entries" style="color:#4A5270">Buchungen</span></button>
    <button class="tbb" onclick="goTab('analytics')"><span class="tbi">🍩</span><span class="tbl" id="tl-analytics" style="color:#4A5270">Analyse</span></button>
    <button class="tbb" onclick="goTab('settings')"><span class="tbi">⚙️</span><span class="tbl" id="tl-settings" style="color:#4A5270">Einst.</span></button>
  </div>
</div>

<!-- ══ SHEET: ADD/EDIT FIXED ══════════════════════════════════ -->
<div class="sheet" id="sh-fixed" style="display:none">
  <div class="sheet-overlay" onclick="closeSheet('sh-fixed')"></div>
  <div class="sheet-body">
    <div class="handle"></div>
    <div style="font-size:17px;font-weight:800;margin-bottom:18px" id="sh-fixed-title">Neu: Wiederkehrend</div>
    <input type="hidden" id="fx-edit-id"/>
    <div class="type-toggle">
      <button class="type-btn active-exp" id="fx-btn-exp" onclick="setFxType('expense')">− Ausgabe</button>
      <button class="type-btn" id="fx-btn-inc" onclick="setFxType('income')">+ Einnahme</button>
    </div>
    <div class="fwrap"><label class="flabel">Bezeichnung</label><input class="field" id="fx-name" type="text" placeholder="z.B. Miete, Gehalt"/></div>
    <div class="fwrap"><label class="flabel">Betrag (€)</label><input class="field" id="fx-amount" type="number" inputmode="decimal" placeholder="0.00"/></div>
    <div class="fwrap"><label class="flabel">Kategorie</label><select class="field" id="fx-cat"></select></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="fwrap"><label class="flabel">Startdatum</label><input class="field" id="fx-start" type="date"/></div>
      <div class="fwrap"><label class="flabel">Enddatum</label><input class="field" id="fx-end" type="date" placeholder="Offen"/></div>
    </div>
    <div class="fwrap"><label class="flabel">Intervall</label>
      <select class="field" id="fx-interval">
        <option value="monthly">Monatlich</option>
        <option value="yearly">Jährlich</option>
      </select>
    </div>
    <div class="fwrap"><label class="flabel">Notiz (optional)</label><input class="field" id="fx-note" type="text" placeholder="z.B. Kündbar ab Okt"/></div>
    <button class="btn btn-p" onclick="saveFixed()" style="margin-bottom:10px">Speichern</button>
    <button class="btn btn-s" onclick="closeSheet('sh-fixed')">Abbrechen</button>
  </div>
</div>

<!-- ══ SHEET: ADD/EDIT VARIABLE ═══════════════════════════════ -->
<div class="sheet" id="sh-var" style="display:none">
  <div class="sheet-overlay" onclick="closeSheet('sh-var')"></div>
  <div class="sheet-body">
    <div class="handle"></div>
    <div style="font-size:17px;font-weight:800;margin-bottom:18px" id="sh-var-title">Neue Buchung</div>
    <input type="hidden" id="vr-edit-id"/>
    <div class="type-toggle">
      <button class="type-btn active-exp" id="vr-btn-exp" onclick="setVrType('expense')">− Ausgabe</button>
      <button class="type-btn" id="vr-btn-inc" onclick="setVrType('income')">+ Einnahme</button>
    </div>
    <div class="fwrap"><label class="flabel">Bezeichnung</label><input class="field" id="vr-name" type="text" placeholder="z.B. Mittagessen, Nachzahlung"/></div>
    <div class="fwrap"><label class="flabel">Betrag (€)</label><input class="field" id="vr-amount" type="number" inputmode="decimal" placeholder="0.00"/></div>
    <div class="fwrap"><label class="flabel">Kategorie</label><select class="field" id="vr-cat"></select></div>
    <div class="fwrap"><label class="flabel">Datum</label><input class="field" id="vr-date" type="date"/></div>
    <div class="fwrap"><label class="flabel">Notiz (optional)</label><input class="field" id="vr-note" type="text" placeholder="z.B. Nachzahlung 2025"/></div>
    <button class="btn btn-p" onclick="saveVariable()" style="margin-bottom:10px">Speichern</button>
    <button class="btn btn-s" onclick="closeSheet('sh-var')">Abbrechen</button>
  </div>
</div>

<!-- ══ SHEET: ADD CHOOSER ═════════════════════════════════════ -->
<div class="sheet" id="sh-add" style="display:none">
  <div class="sheet-overlay" onclick="closeSheet('sh-add')"></div>
  <div class="sheet-body" style="padding-bottom:calc(16px + env(safe-area-inset-bottom,16px))">
    <div class="handle"></div>
    <div style="font-size:17px;font-weight:800;margin-bottom:20px">Was möchtest du erfassen?</div>
    <button class="btn btn-s" onclick="closeSheet('sh-add');openFixed(null)" style="margin-bottom:10px;text-align:left;padding:16px 18px;border-radius:14px">
      <div style="font-size:16px;font-weight:700;color:#F1F5F9">🔁 Wiederkehrend</div>
      <div style="font-size:12px;color:#4A5270;margin-top:3px;font-weight:400">Miete, Gehalt, Abos — feste Intervalle</div>
    </button>
    <button class="btn btn-s" onclick="closeSheet('sh-add');openVariable(null)" style="text-align:left;padding:16px 18px;border-radius:14px">
      <div style="font-size:16px;font-weight:700;color:#F1F5F9">💸 Variable Buchung</div>
      <div style="font-size:12px;color:#4A5270;margin-top:3px;font-weight:400">Mittagessen, Nachzahlung, Einkauf</div>
    </button>
  </div>
</div>

<!-- ══ SHEET: PROFILE ═════════════════════════════════════════ -->
<div class="sheet" id="sh-prof" style="display:none">
  <div class="sheet-overlay" onclick="closeSheet('sh-prof')"></div>
  <div class="sheet-body">
    <div class="handle"></div>
    <div style="font-size:17px;font-weight:800;margin-bottom:18px" id="sh-prof-title">Neues Profil</div>
    <input type="hidden" id="pr-edit-id"/>
    <div class="fwrap"><label class="flabel">Name</label><input class="field" id="pr-name" type="text" placeholder="z.B. André, Sarah, Haushalt"/></div>
    <button class="btn btn-p" onclick="saveProfile()" style="margin-bottom:10px">Speichern</button>
    <button class="btn btn-s" onclick="closeSheet('sh-prof')">Abbrechen</button>
  </div>
</div>

<!-- ══ SHEET: CATEGORIES ══════════════════════════════════════ -->
<div class="sheet" id="sh-cats" style="display:none">
  <div class="sheet-overlay" onclick="closeSheet('sh-cats')"></div>
  <div class="sheet-body">
    <div class="handle"></div>
    <div style="font-size:17px;font-weight:800;margin-bottom:18px">Kategorien verwalten</div>
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <button class="btn btn-sm" id="cmt-exp" onclick="setCatMgmtType('expense')" style="flex:1;background:rgba(248,113,113,.2);color:#F87171">Ausgabe</button>
      <button class="btn btn-sm" id="cmt-inc" onclick="setCatMgmtType('income')" style="flex:1;background:#1E2235;color:#4A5270">Einnahme</button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <input class="field" id="cat-new-name" type="text" placeholder="Neue Kategorie..." style="flex:1"/>
      <button class="btn btn-p btn-sm" onclick="addCat()">+ Add</button>
    </div>
    <div id="cat-list" style="max-height:300px;overflow-y:auto"></div>
    <button class="btn btn-s" onclick="closeSheet('sh-cats')" style="margin-top:14px">Schließen</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════
const C = {
  bg:'#0A0C12', surf:'#161923', card:'#1A1E2E', border:'#1E2235',
  accent:'#5B8AF0', green:'#34D399', red:'#F87171', yellow:'#FBBF24',
  muted:'#4A5270', text:'#F1F5F9', sub:'#6B7A99'
};
const PCOLS = ['#5B8AF0','#A78BFA','#34D399','#FBBF24','#F87171','#38BDF8','#FB923C'];
const CAT_EXP_COLS = ['#F87171','#FB923C','#FBBF24','#E879F9','#F472B6','#C084FC','#FF6B6B','#FFA94D','#FFD43B','#DA77F2'];
const CAT_INC_COLS = ['#34D399','#38BDF8','#60A5FA','#4ADE80','#2DD4BF','#818CF8','#A3E635','#22D3EE','#6EE7B7','#93C5FD'];
const ICONS = {
  'Gehalt':'💼','Bonus':'🎁','Kindergeld':'👶','Nebeneinkommen':'💡','Miete':'🏠',
  'Nebenkosten':'⚡','Lebensmittel':'🛒','Abonnements':'📱','Versicherung':'🛡️',
  'Mobilität':'🚗','Gesundheit':'❤️','Freizeit':'🎉','Kleidung':'👕','Baby':'🍼',
  'Restaurant':'🍽️','Sonstiges':'📦'
};
const DEF_CATS = {
  income:['Gehalt','Bonus','Kindergeld','Nebeneinkommen','Sonstiges'],
  expense:['Miete','Nebenkosten','Lebensmittel','Abonnements','Versicherung','Mobilität','Gesundheit','Freizeit','Kleidung','Baby','Restaurant','Sonstiges']
};
const fmt = n => new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR'}).format(n||0);
const todayStr = () => new Date().toISOString().split('T')[0];
const monthKey = (y,m) => `${y}-${String(m).padStart(2,'0')}`;

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let S = {
  profiles: [],
  activeProfile: 0,
  tab: 'dashboard',
  year: new Date().getFullYear(),
  month: monthKey(new Date().getFullYear(), new Date().getMonth()+1),
  fxType: 'expense',
  vrType: 'expense',
  catMgmtType: 'expense'
};
let CATS = {income:[...DEF_CATS.income], expense:[...DEF_CATS.expense]};

// ═══════════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════════
function loadAll() {
  try {
    const p = localStorage.getItem('budget_profiles');
    if(p) S.profiles = JSON.parse(p);
    const c = localStorage.getItem('budget_cats');
    if(c) CATS = JSON.parse(c);
  } catch(e){}
  if(!S.profiles.length) S.profiles = [{id:'p1',name:'Name',color:PCOLS[0],fixed:[],variable:[]}];
}
function saveAll() {
  localStorage.setItem('budget_profiles', JSON.stringify(S.profiles));

}
function saveCats() { localStorage.setItem('budget_cats', JSON.stringify(CATS)); }

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
const prof = () => S.profiles[S.activeProfile] || S.profiles[0];

// Is a fixed entry active in a given month?
function fxActiveInMonth(fx, ym) {
  // ym is 'YYYY-MM', compare as strings (ISO format sorts correctly)
  const ymStart = ym + '-01';
  const ymEnd   = ym + '-31'; // safe upper bound for string compare
  // Entry hasn't started yet this month
  if(fx.start.slice(0,7) > ym) return false;
  // Entry ended before this month
  if(fx.end && fx.end.slice(0,7) < ym) return false;
  // Yearly: only show in the month matching start month
  if(fx.interval === 'yearly') {
    return fx.start.slice(5,7) === ym.slice(5,7);
  }
  return true;
}

// Get all fixed entries active in current month
function activeFxForMonth(ym) {
  return prof().fixed.filter(fx => fxActiveInMonth(fx, ym));
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
function init() {
  loadAll();
  buildYearSel();
  renderAll();
}

function buildYearSel() {
  const el = document.getElementById('year-sel');
  [2024,2025,2026,2027,2028,2029,2030].forEach(y => {
    const o = document.createElement('option');
    o.value = y; o.textContent = y;
    if(y === S.year) o.selected = true;
    el.appendChild(o);
  });
}

// ═══════════════════════════════════════════════════
// RENDER FRAME
// ═══════════════════════════════════════════════════
function renderAll() {
  renderHeader();
  renderProfileRow();
  renderMonthRow();
  renderPage();
}

function renderHeader() {
  const p = prof();
  document.getElementById('hdr-name').textContent = p.name;
  const av = document.getElementById('hdr-av');
  av.style.background = p.color;
  av.textContent = p.name[0].toUpperCase();
}

function renderProfileRow() {
  const el = document.getElementById('prof-row');
  el.innerHTML = S.profiles.map((p,i) => `
    <button onclick="switchProf(${i})" style="padding:5px 14px;border-radius:20px;border:none;cursor:pointer;
      font-size:13px;font-weight:700;white-space:nowrap;
      background:${S.activeProfile===i?p.color:'#161923'};
      color:${S.activeProfile===i?'#fff':C.sub}">${p.name}</button>
  `).join('') + `<button onclick="openSheet('prof')" style="padding:5px 14px;border-radius:20px;
    border:1px dashed #2A2F45;background:transparent;color:${C.muted};font-size:13px;cursor:pointer;white-space:nowrap">+ Neu</button>`;
}

function renderMonthRow() {
  const el = document.getElementById('month-row');
  const labels = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
  el.innerHTML = labels.map((l,i) => {
    const mk = monthKey(S.year, i+1);
    const active = S.month === mk;
    return `<button onclick="setMonth('${mk}')" style="padding:5px 13px;border-radius:20px;border:none;cursor:pointer;
      font-size:12px;font-weight:700;white-space:nowrap;
      background:${active?C.accent+'33':'#161923'};
      color:${active?C.accent:C.sub}">${l}</button>`;
  }).join('');
}

function renderPage() {
  ['dashboard','entries','analytics','settings'].forEach(t => {
    const pg = document.getElementById('pg-'+t);
    const lbl = document.getElementById('tl-'+t);
    if(pg) pg.classList.toggle('active', t===S.tab);
    if(lbl) lbl.style.color = t===S.tab ? C.accent : C.muted;
  });
  const fab = document.getElementById('fab');
  if(fab) fab.style.display = S.tab==='settings' ? 'none' : 'flex';

  if(S.tab==='dashboard') renderDashboard();
  else if(S.tab==='entries') renderEntries();
  else if(S.tab==='analytics') renderAnalytics();
  else if(S.tab==='settings') renderSettings();
}

// ═══════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════
function renderDashboard() {
  const el = document.getElementById('pg-dashboard');
  const p = prof();
  const ym = S.month;

  // Fixed active this month
  const activeFx = activeFxForMonth(ym);
  const fxInc = activeFx.filter(f=>f.type==='income').reduce((s,f)=>s+f.amount,0);
  const fxExp = activeFx.filter(f=>f.type==='expense').reduce((s,f)=>s+f.amount,0);

  // Variable this month
  const varM = p.variable.filter(v=>v.date.startsWith(ym));
  const vrInc = varM.filter(v=>v.type==='income').reduce((s,v)=>s+v.amount,0);
  const vrExp = varM.filter(v=>v.type==='expense').reduce((s,v)=>s+v.amount,0);

  const totalInc = fxInc + vrInc;
  const totalExp = fxExp + vrExp;
  const balance = totalInc - totalExp;
  const savRate = totalInc>0 ? Math.max(0,(balance/totalInc)*100) : 0;

  // Donut
  const total = totalInc + totalExp || 1;
  const r=52,cx=68,cy=68,sw=14,circ=2*Math.PI*r;
  const incDash=(totalInc/total)*circ;
  const balCol = balance>=0?C.green:C.red;

  el.innerHTML = `
    <!-- Balance card -->
    <div class="card" style="margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:16px">
        <svg width="136" height="136" style="flex-shrink:0">
          <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${C.border}" stroke-width="${sw}"/>
          <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${C.green}" stroke-width="${sw}"
            stroke-dasharray="${incDash} ${circ}" stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})"/>
          <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${C.red}" stroke-width="${sw}"
            stroke-dasharray="${circ-incDash} ${circ}" stroke-dashoffset="${-incDash}"
            stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})"/>
          <text x="${cx}" y="${cy-5}" text-anchor="middle" fill="${balCol}" font-size="13" font-weight="700" font-family="-apple-system,sans-serif">${balance>=0?'+':''}${fmt(balance).replace(' €','')}</text>
          <text x="${cx}" y="${cy+11}" text-anchor="middle" fill="${C.sub}" font-size="10" font-family="-apple-system,sans-serif">Bilanz</text>
        </svg>
        <div style="flex:1">
          <div style="margin-bottom:12px">
            <div style="font-size:10px;color:${C.sub};font-weight:700;letter-spacing:.5px">EINNAHMEN</div>
            <div style="font-size:20px;font-weight:800;color:${C.green}">${fmt(totalInc)}</div>
          </div>
          <div>
            <div style="font-size:10px;color:${C.sub};font-weight:700;letter-spacing:.5px">AUSGABEN</div>
            <div style="font-size:20px;font-weight:800;color:${C.red}">${fmt(totalExp)}</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Sparquote -->
    ${totalInc>0?`<div class="card" style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:12px;color:${C.sub};font-weight:700">SPARQUOTE</span>
        <span style="font-size:13px;font-weight:800;color:${C.yellow}">${savRate.toFixed(1)}%</span>
      </div>
      <div style="height:6px;border-radius:3px;background:${C.border}">
        <div style="height:6px;border-radius:3px;background:${C.yellow};width:${Math.min(100,savRate).toFixed(1)}%;transition:width .4s"></div>
      </div>
    </div>`:''}

    <!-- Split: Fix vs Variabel -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
      <div class="card">
        <div style="font-size:10px;color:${C.sub};font-weight:700;letter-spacing:.5px;margin-bottom:6px">🔁 WIEDERKEHREND</div>
        <div style="font-size:17px;font-weight:800;color:${C.red}">${fmt(fxExp)}</div>
        <div style="font-size:11px;color:${C.green};margin-top:2px">+${fmt(fxInc)}</div>
      </div>
      <div class="card">
        <div style="font-size:10px;color:${C.sub};font-weight:700;letter-spacing:.5px;margin-bottom:6px">💸 VARIABEL</div>
        <div style="font-size:17px;font-weight:800;color:${C.red}">${fmt(vrExp)}</div>
        <div style="font-size:11px;color:${C.green};margin-top:2px">+${fmt(vrInc)}</div>
      </div>
    </div>

    <!-- Active fixed this month -->
    <div class="card">
      <div class="slabel" style="margin-bottom:12px">Wiederkehrend diesen Monat</div>
      ${activeFx.length===0?`<div style="color:${C.muted};font-size:13px">Keine Fixkosten aktiv</div>`
        :activeFx.slice(0,5).map(f=>`
          <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid ${C.border}">
            <div style="display:flex;align-items:center;gap:10px">
              <span style="font-size:18px">${ICONS[f.category]||'•'}</span>
              <div>
                <div style="font-size:14px;font-weight:600">${f.name}</div>
                <div style="font-size:11px;color:${C.sub}">${f.category}</div>
              </div>
            </div>
            <div style="font-size:15px;font-weight:800;color:${f.type==='income'?C.green:C.red}">${f.type==='income'?'+':'-'}${fmt(f.amount)}</div>
          </div>`).join('')
      }
      ${activeFx.length>5?`<div style="font-size:12px;color:${C.sub};padding-top:8px;text-align:center">+ ${activeFx.length-5} weitere</div>`:''}
    </div>

    <!-- Recent variable -->
    ${varM.length>0?`<div class="card" style="margin-top:14px">
      <div class="slabel" style="margin-bottom:12px">Letzte variable Buchungen</div>
      ${[...varM].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,4).map(v=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid ${C.border}">
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:18px">${ICONS[v.category]||'•'}</span>
            <div>
              <div style="font-size:14px;font-weight:600">${v.name}</div>
              <div style="font-size:11px;color:${C.sub}">${new Date(v.date).toLocaleDateString('de-DE',{day:'2-digit',month:'short'})}</div>
            </div>
          </div>
          <div style="font-size:15px;font-weight:800;color:${v.type==='income'?C.green:C.red}">${v.type==='income'?'+':'-'}${fmt(v.amount)}</div>
        </div>`).join('')}
    </div>`:''}
  `;
}

// ═══════════════════════════════════════════════════
// ENTRIES PAGE (fixed + variable combined, sorted by amount)
// ═══════════════════════════════════════════════════
function renderEntries() {
  const el = document.getElementById('pg-entries');
  const p = prof();
  const ym = S.month;

  // Build combined list
  const fxItems = activeFxForMonth(ym).map(f => ({...f, _kind:'recurring'}));
  const vrItems = p.variable.filter(v => v.date.startsWith(ym)).map(v => ({...v, _kind:'once'}));
  const all = [...fxItems, ...vrItems].sort((a,b) => b.amount - a.amount);

  const totalInc = all.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
  const totalExp = all.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);

  if(!all.length) {
    el.innerHTML = `<div class="empty"><div class="empty-i">📋</div><div>Keine Buchungen diesen Monat.</div></div>`;
    return;
  }

  const entryCard = (e) => {
    const isRec = e._kind === 'recurring';
    const badge = isRec
      ? `<span class="badge" style="background:${C.accent+'22'};color:${C.accent};font-size:10px">🔁 Wiederkehrend</span>`
      : `<span class="badge" style="background:${C.muted+'22'};color:${C.sub};font-size:10px">Einmalig</span>`;
    const sub = isRec
      ? `${e.category} · ${e.interval==='monthly'?'monatlich':'jährlich'}`
      : `${e.category} · ${new Date(e.date).toLocaleDateString('de-DE',{day:'2-digit',month:'short'})}`;
    const editFn = isRec ? `openFixed('${e.id}')` : `openVariable('${e.id}')`;
    const delFn  = isRec ? `deleteFixed('${e.id}')` : `deleteVariable('${e.id}')`;
    return `
      <div class="card-flat" style="margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:40px;height:40px;border-radius:11px;background:${e.type==='income'?C.green+'20':C.red+'20'};
            display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">${ICONS[e.category]||'•'}</div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
              <span style="font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px">${e.name}</span>
              ${badge}
            </div>
            <div style="font-size:11px;color:${C.sub};margin-top:2px">${sub}${e.note?` · ${e.note}`:''}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
            <div style="font-size:16px;font-weight:800;color:${e.type==='income'?C.green:C.red}">${e.type==='income'?'+':'-'}${fmt(e.amount)}</div>
            <div style="display:flex;gap:6px">
              <button onclick="${editFn}" style="background:${C.accent+'22'};color:${C.accent};border:none;border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer">✏️</button>
              <button onclick="${delFn}" style="background:${C.red+'22'};color:${C.red};border:none;border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer">🗑</button>
            </div>
          </div>
        </div>
      </div>`;
  };

  el.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
      <div class="card" style="padding:12px">
        <div style="font-size:10px;color:${C.sub};font-weight:700;margin-bottom:4px">EINNAHMEN</div>
        <div style="font-size:18px;font-weight:800;color:${C.green}">${fmt(totalInc)}</div>
      </div>
      <div class="card" style="padding:12px">
        <div style="font-size:10px;color:${C.sub};font-weight:700;margin-bottom:4px">AUSGABEN</div>
        <div style="font-size:18px;font-weight:800;color:${C.red}">${fmt(totalExp)}</div>
      </div>
    </div>
    ${all.map(entryCard).join('')}
  `;
}

// ═══════════════════════════════════════════════════
// FIXED PAGE (kept for internal use / settings)
// ═══════════════════════════════════════════════════
function renderFixed() {
  const el = document.getElementById('pg-fixed');
  const p = prof();
  const all = p.fixed;
  const ym = S.month;
  const active = all.filter(f => fxActiveInMonth(f, ym));
  const inactive = all.filter(f => !fxActiveInMonth(f, ym));

  const fxCard = (f) => {
    const exp = f.end && f.end < ym+'-01';
    const future = f.start > ym+'-31';
    const endBadge = f.end
      ? `<span class="badge" style="background:${exp?C.red+'22':C.yellow+'22'};color:${exp?C.red:C.yellow}">
          ${exp?'Abgelaufen':'bis '+new Date(f.end).toLocaleDateString('de-DE',{month:'short',year:'numeric'})}
        </span>`
      : `<span class="badge" style="background:${C.green+'18'};color:${C.green}">Unbegrenzt</span>`;
    const startBadge = future
      ? `<span class="badge" style="background:${C.accent+'22'};color:${C.accent}">ab ${new Date(f.start).toLocaleDateString('de-DE',{month:'short',year:'numeric'})}</span>`
      : '';
    return `
      <div class="card-flat" style="margin-bottom:10px;${exp||future?'opacity:.55':''}">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:40px;height:40px;border-radius:11px;background:${f.type==='income'?C.green+'20':C.red+'20'};
            display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">${ICONS[f.category]||'•'}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${f.name}</div>
            <div style="font-size:11px;color:${C.sub};margin-top:2px;display:flex;gap:6px;flex-wrap:wrap;align-items:center">
              <span>${f.category}</span><span>·</span><span>${f.interval==='monthly'?'monatlich':'jährlich'}</span>
              ${endBadge}${startBadge}
            </div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
            <div style="font-size:16px;font-weight:800;color:${f.type==='income'?C.green:C.red}">${f.type==='income'?'+':'-'}${fmt(f.amount)}</div>
            <div style="display:flex;gap:6px">
              <button onclick="openFixed('${f.id}')" style="background:${C.accent+'22'};color:${C.accent};border:none;border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer">✏️</button>
              <button onclick="deleteFixed('${f.id}')" style="background:${C.red+'22'};color:${C.red};border:none;border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer">🗑</button>
            </div>
          </div>
        </div>
        ${f.note?`<div style="font-size:12px;color:${C.sub};margin-top:8px;padding-top:8px;border-top:1px solid ${C.border}">💬 ${f.note}</div>`:''}
      </div>`;
  };

  const incFx = active.filter(f=>f.type==='income');
  const expFx = active.filter(f=>f.type==='expense');
  const totalActInc = incFx.reduce((s,f)=>s+f.amount,0);
  const totalActExp = expFx.reduce((s,f)=>s+f.amount,0);

  el.innerHTML = `
    ${active.length===0&&inactive.length===0?`
      <div class="empty"><div class="empty-i">📌</div><div>Noch keine Fixkosten.<br>Tippe + um welche hinzuzufügen.</div></div>`:`

      ${active.length>0?`
        <!-- Summary bar -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
          <div class="card" style="padding:12px">
            <div style="font-size:10px;color:${C.sub};font-weight:700;margin-bottom:4px">AKTIV EINNAHMEN</div>
            <div style="font-size:18px;font-weight:800;color:${C.green}">${fmt(totalActInc)}</div>
          </div>
          <div class="card" style="padding:12px">
            <div style="font-size:10px;color:${C.sub};font-weight:700;margin-bottom:4px">AKTIV AUSGABEN</div>
            <div style="font-size:18px;font-weight:800;color:${C.red}">${fmt(totalActExp)}</div>
          </div>
        </div>
        <div class="slabel">Aktiv diesen Monat (${active.length})</div>
        ${active.map(fxCard).join('')}`:''}

      ${inactive.length>0?`
        <div class="slabel" style="margin-top:${active.length>0?18:0}px">Inaktiv / Zukünftig (${inactive.length})</div>
        ${inactive.map(fxCard).join('')}`:''}
    `}
  `;
}

// ═══════════════════════════════════════════════════
// ANALYTICS
// ═══════════════════════════════════════════════════
function renderAnalytics() {
  const el = document.getElementById('pg-analytics');
  const p = prof();
  const ym = S.month;

  // Combine fixed + variable for the month
  const fxEntries = activeFxForMonth(ym).map(f=>({...f, source:'fix'}));
  const vrEntries = p.variable.filter(v=>v.date.startsWith(ym)).map(v=>({...v,source:'var'}));
  const all = [...fxEntries,...vrEntries];
  const expAll = all.filter(e=>e.type==='expense');
  const incAll = all.filter(e=>e.type==='income');
  const totalExp = expAll.reduce((s,e)=>s+e.amount,0);
  const totalInc = incAll.reduce((s,e)=>s+e.amount,0);

  const catMap = (entries) => {
    const m={};
    entries.forEach(e=>{m[e.category]=(m[e.category]||0)+e.amount;});
    return Object.entries(m).sort((a,b)=>b[1]-a[1]);
  };

  const donut = (cats, total, cols, label) => {
    if(!cats.length) return `<div style="color:${C.muted};font-size:13px">Keine Einträge</div>`;
    const r=50,cx=64,cy=64,sw=16,circ=2*Math.PI*r;
    let off=0;
    const segs = cats.map(([c,a],i)=>{
      const dash=(a/total)*circ;
      const seg=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${cols[i%cols.length]}" stroke-width="${sw}"
        stroke-dasharray="${dash-1.5} ${circ}" stroke-dashoffset="${-off}" transform="rotate(-90 ${cx} ${cy})"/>`;
      off+=dash; return seg;
    }).join('');
    return `<div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
      <svg width="128" height="128" style="flex-shrink:0">
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${C.border}" stroke-width="${sw}"/>
        ${segs}
        <text x="${cx}" y="${cy-4}" text-anchor="middle" fill="${C.text}" font-size="12" font-weight="700" font-family="-apple-system,sans-serif">${fmt(total).replace(' €','')}</text>
        <text x="${cx}" y="${cy+11}" text-anchor="middle" fill="${C.sub}" font-size="10" font-family="-apple-system,sans-serif">${label}</text>
      </svg>
      <div style="flex:1;min-width:130px">
        ${cats.slice(0,6).map(([c,a],i)=>`
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
            <div style="width:9px;height:9px;border-radius:50%;background:${cols[i%cols.length]};flex-shrink:0"></div>
            <div style="flex:1;min-width:0">
              <div style="font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${ICONS[c]||'•'} ${c}</div>
              <div style="font-size:10px;color:${C.sub}">${((a/total)*100).toFixed(0)}% · ${fmt(a)}</div>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
  };

  const bars = (cats, total, cols) => cats.map(([c,a],i)=>`
    <div style="margin-bottom:11px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:13px;display:flex;align-items:center;gap:6px">
          <span style="width:8px;height:8px;border-radius:50%;background:${cols[i%cols.length]};display:inline-block"></span>
          ${ICONS[c]||'•'} ${c}
        </span>
        <span style="font-size:13px;font-weight:700;color:${cols[i%cols.length]}">${fmt(a)} <span style="font-size:10px;color:${C.sub};font-weight:400">(${((a/total)*100).toFixed(0)}%)</span></span>
      </div>
      <div style="height:5px;border-radius:3px;background:${C.border}">
        <div style="height:5px;border-radius:3px;background:${cols[i%cols.length]};width:${((a/total)*100).toFixed(1)}%;transition:width .4s"></div>
      </div>
    </div>`).join('');

  const expCats = catMap(expAll);
  const incCats = catMap(incAll);

  el.innerHTML = `
    ${expCats.length>0?`
    <div class="card" style="margin-bottom:14px">
      <div class="slabel">Ausgaben nach Kategorie</div>
      ${donut(expCats,totalExp,CAT_EXP_COLS,'Ausgaben')}
    </div>
    <div class="card" style="margin-bottom:14px">
      <div class="slabel">Ausgaben Detail</div>
      ${bars(expCats,totalExp,CAT_EXP_COLS)}
    </div>`:`<div class="empty"><div class="empty-i">🍩</div><div>Keine Ausgaben diesen Monat</div></div>`}

    ${incCats.length>0?`
    <div class="card" style="margin-bottom:14px">
      <div class="slabel">Einnahmen nach Kategorie</div>
      ${donut(incCats,totalInc,CAT_INC_COLS,'Einnahmen')}
    </div>
    <div class="card">
      <div class="slabel">Einnahmen Detail</div>
      ${bars(incCats,totalInc,CAT_INC_COLS)}
    </div>`:''}
  `;
}

// ═══════════════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════════════
function renderSettings() {
  const el = document.getElementById('pg-settings');
  el.innerHTML = `
    <div class="slabel">Profile</div>
    ${S.profiles.map((p,i)=>`
      <div class="card-flat" style="margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
          <div style="width:40px;height:40px;border-radius:50%;background:${p.color};display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:#fff;flex-shrink:0">${p.name[0].toUpperCase()}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}</div>
            <div style="font-size:12px;color:${C.sub}">${p.fixed.length} Wiederkehrend · ${p.variable.length} Buchungen</div>
          </div>
        </div>
        <div style="display:flex;gap:8px">
          <button onclick="switchProf(${i});goTab('dashboard')" class="btn btn-p btn-sm" style="flex:1">Öffnen</button>
          <button onclick="editProf(${i})" class="btn btn-s btn-sm" style="flex:1">✏️ Umbenennen</button>
          ${S.profiles.length>1?`<button onclick="deleteProf(${i})" class="btn btn-d btn-sm" style="flex:1">🗑 Löschen</button>`:''}
        </div>
      </div>`).join('')}
    <button class="btn btn-s" onclick="openSheet('prof')" style="margin-top:4px;margin-bottom:20px">+ Neues Profil</button>

    <div class="slabel">Kategorien</div>
    <button class="btn btn-s" onclick="openSheet('cats')" style="margin-bottom:20px">🏷️ Kategorien verwalten</button>

    <div class="slabel">Daten</div>
    <button class="btn btn-s" onclick="exportData()">📤 Daten exportieren (JSON)</button>
  `;
}

// ═══════════════════════════════════════════════════
// FIXED CRUD
// ═══════════════════════════════════════════════════
function openFixed(id) {
  const sh = document.getElementById('sh-fixed');
  const title = document.getElementById('sh-fixed-title');
  document.getElementById('fx-edit-id').value = id||'';
  if(id) {
    const f = prof().fixed.find(x=>x.id===id);
    if(!f) return;
    title.textContent = 'Fixkosten bearbeiten';
    setFxType(f.type);
    document.getElementById('fx-name').value = f.name;
    document.getElementById('fx-amount').value = f.amount;
    document.getElementById('fx-start').value = f.start;
    document.getElementById('fx-end').value = f.end||'';
    document.getElementById('fx-note').value = f.note||'';
    document.getElementById('fx-interval').value = f.interval;
    populateCatSel('fx-cat', f.type, f.category);
  } else {
    title.textContent = 'Neue Fixkosten';
    setFxType('expense');
    document.getElementById('fx-name').value='';
    document.getElementById('fx-amount').value='';
    document.getElementById('fx-start').value=S.month+'-01';
    document.getElementById('fx-end').value='';
    document.getElementById('fx-note').value='';
    document.getElementById('fx-interval').value='monthly';
    populateCatSel('fx-cat','expense','');
  }
  sh.style.display='block';
}

function setFxType(t) {
  S.fxType = t;
  const eb = document.getElementById('fx-btn-exp');
  const ib = document.getElementById('fx-btn-inc');
  if(!eb||!ib) return;
  eb.className = 'type-btn' + (t==='expense'?' active-exp':'');
  ib.className = 'type-btn' + (t==='income'?' active-inc':'');
  populateCatSel('fx-cat', t, '');
}

function saveFixed() {
  const name = document.getElementById('fx-name').value.trim();
  const amount = parseFloat(document.getElementById('fx-amount').value);
  const start = document.getElementById('fx-start').value;
  if(!name||isNaN(amount)||amount<=0||!start){showToast('Bitte alle Pflichtfelder ausfüllen',C.red);return;}
  const editId = document.getElementById('fx-edit-id').value;
  const entry = {
    id: editId||Date.now().toString(),
    type: S.fxType,
    name, amount,
    category: document.getElementById('fx-cat').value,
    start,
    end: document.getElementById('fx-end').value||null,
    interval: document.getElementById('fx-interval').value,
    note: document.getElementById('fx-note').value.trim()
  };
  const p = prof();
  if(editId) {
    const i = p.fixed.findIndex(x=>x.id===editId);
    if(i>-1) p.fixed[i]=entry;
  } else {
    p.fixed.push(entry);
  }
  saveAll();
  closeSheet('sh-fixed');
  showToast(editId?'Wiederkehrend aktualisiert ✓':'Wiederkehrend gespeichert ✓');
  S.tab = 'entries';
  renderPage();
}

function deleteFixed(id) {
  showConfirm('Fixkosten löschen?', ()=>{
    prof().fixed = prof().fixed.filter(f=>f.id!==id);
    saveAll();
    showToast('Gelöscht',C.yellow);
    renderPage();
  });
}

// ═══════════════════════════════════════════════════
// VARIABLE CRUD
// ═══════════════════════════════════════════════════
function openVariable(id) {
  const title = document.getElementById('sh-var-title');
  document.getElementById('vr-edit-id').value = id||'';
  if(id) {
    const v = prof().variable.find(x=>x.id===id);
    if(!v) return;
    title.textContent = 'Buchung bearbeiten';
    setVrType(v.type);
    document.getElementById('vr-name').value = v.name;
    document.getElementById('vr-amount').value = v.amount;
    document.getElementById('vr-date').value = v.date;
    document.getElementById('vr-note').value = v.note||'';
    populateCatSel('vr-cat', v.type, v.category);
  } else {
    title.textContent = 'Neue Buchung';
    setVrType('expense');
    document.getElementById('vr-name').value='';
    document.getElementById('vr-amount').value='';
    document.getElementById('vr-date').value=todayStr();
    document.getElementById('vr-note').value='';
    populateCatSel('vr-cat','expense','');
  }
  document.getElementById('sh-var').style.display='block';
}

function setVrType(t) {
  S.vrType = t;
  const eb = document.getElementById('vr-btn-exp');
  const ib = document.getElementById('vr-btn-inc');
  if(!eb||!ib) return;
  eb.className = 'type-btn' + (t==='expense'?' active-exp':'');
  ib.className = 'type-btn' + (t==='income'?' active-inc':'');
  populateCatSel('vr-cat', t, '');
}

function saveVariable() {
  const name = document.getElementById('vr-name').value.trim();
  const amount = parseFloat(document.getElementById('vr-amount').value);
  const date = document.getElementById('vr-date').value;
  if(!name||isNaN(amount)||amount<=0){showToast('Bitte Name und Betrag angeben',C.red);return;}
  const editId = document.getElementById('vr-edit-id').value;
  const entry = {
    id: editId||Date.now().toString(),
    type: S.vrType,
    name, amount,
    category: document.getElementById('vr-cat').value,
    date: date||todayStr(),
    note: document.getElementById('vr-note').value.trim()
  };
  const p = prof();
  if(editId) {
    const i = p.variable.findIndex(x=>x.id===editId);
    if(i>-1) p.variable[i]=entry;
  } else {
    p.variable.push(entry);
  }
  saveAll();
  closeSheet('sh-var');
  showToast(editId?'Buchung aktualisiert ✓':'Buchung gespeichert ✓');
  S.tab = 'entries';
  renderPage();
}

function deleteVariable(id) {
  showConfirm('Buchung löschen?', ()=>{
    prof().variable = prof().variable.filter(v=>v.id!==id);
    saveAll();
    showToast('Gelöscht',C.yellow);
    renderPage();
  });
}

// ═══════════════════════════════════════════════════
// PROFILES
// ═══════════════════════════════════════════════════
function saveProfile() {
  const name = document.getElementById('pr-name').value.trim();
  if(!name){showToast('Bitte Name eingeben',C.red);return;}
  const editId = document.getElementById('pr-edit-id').value;
  if(editId) {
    const p = S.profiles.find(x=>x.id===editId);
    if(p) p.name=name;
  } else {
    S.profiles.push({id:Date.now().toString(),name,color:PCOLS[S.profiles.length%PCOLS.length],fixed:[],variable:[]});
    S.activeProfile = S.profiles.length-1;
  }
  saveAll();
  closeSheet('sh-prof');
  showToast(editId?'Name geändert ✓':`Profil "${name}" erstellt ✓`);
  renderAll();
}

function editProf(i) {
  document.getElementById('pr-edit-id').value = S.profiles[i].id;
  document.getElementById('pr-name').value = S.profiles[i].name;
  document.getElementById('sh-prof-title').textContent = 'Profil umbenennen';
  document.getElementById('sh-prof').style.display='block';
}

function deleteProf(i) {
  if(S.profiles.length<=1){showToast('Letztes Profil kann nicht gelöscht werden',C.red);return;}
  showConfirm(`Profil "${S.profiles[i].name}" löschen?`, ()=>{
    S.profiles.splice(i,1);
    if(S.activeProfile>=S.profiles.length) S.activeProfile=S.profiles.length-1;
    saveAll();
    showToast('Profil gelöscht',C.yellow);
    renderAll();
  });
}

// ═══════════════════════════════════════════════════
// CATEGORIES
// ═══════════════════════════════════════════════════
function populateCatSel(selId, type, selected) {
  const sel = document.getElementById(selId);
  if(!sel) return;
  sel.innerHTML = CATS[type].map(c=>`<option value="${c}" ${c===selected?'selected':''}>${ICONS[c]||'•'} ${c}</option>`).join('');
}

function setCatMgmtType(t) {
  S.catMgmtType = t;
  const eb = document.getElementById('cmt-exp');
  const ib = document.getElementById('cmt-inc');
  if(eb) { eb.style.background=t==='expense'?'rgba(248,113,113,.2)':'#1E2235'; eb.style.color=t==='expense'?C.red:C.sub; }
  if(ib) { ib.style.background=t==='income'?'rgba(52,211,153,.2)':'#1E2235'; ib.style.color=t==='income'?C.green:C.sub; }
  renderCatList();
}

function renderCatList() {
  const el = document.getElementById('cat-list');
  if(!el) return;
  const t = S.catMgmtType;
  el.innerHTML = CATS[t].map(c=>`
    <div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid ${C.border}">
      <span style="font-size:18px">${ICONS[c]||'🏷️'}</span>
      <span style="flex:1;font-size:14px;font-weight:600">${c}</span>
      ${DEF_CATS[t].includes(c)
        ? `<span style="font-size:11px;color:${C.muted};font-weight:600">Standard</span>`
        : `<button onclick="deleteCat('${t}','${c}')" style="background:${C.red+'22'};color:${C.red};border:none;border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer">🗑</button>`}
    </div>`).join('');
}

function addCat() {
  const name = document.getElementById('cat-new-name').value.trim();
  if(!name){showToast('Bitte Name eingeben',C.red);return;}
  if(CATS[S.catMgmtType].includes(name)){showToast('Bereits vorhanden',C.yellow);return;}
  CATS[S.catMgmtType].push(name);
  saveCats();
  document.getElementById('cat-new-name').value='';
  renderCatList();
  showToast(`"${name}" hinzugefügt ✓`);
}

function deleteCat(type, name) {
  showConfirm(`Kategorie "${name}" löschen?`, ()=>{
    CATS[type] = CATS[type].filter(c=>c!==name);
    saveCats();
    renderCatList();
    showToast('Kategorie gelöscht',C.yellow);
  });
}

// ═══════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════
function goTab(t) { S.tab=t; renderPage(); }
function switchProf(i) { S.activeProfile=i; renderAll(); }
function setYear(y) { S.year=y; S.month=monthKey(y, parseInt(S.month.slice(5,7))); renderMonthRow(); renderPage(); }
function setMonth(m) { S.month=m; renderMonthRow(); renderPage(); }

// ═══════════════════════════════════════════════════
// SHEETS
// ═══════════════════════════════════════════════════
function openSheet(type) {
  if(type==='add') { document.getElementById('sh-add').style.display='block'; return; }
  if(type==='prof') {
    document.getElementById('pr-edit-id').value='';
    document.getElementById('pr-name').value='';
    document.getElementById('sh-prof-title').textContent='Neues Profil';
    document.getElementById('sh-prof').style.display='block'; return;
  }
  if(type==='cats') {
    setCatMgmtType('expense');
    document.getElementById('sh-cats').style.display='block'; return;
  }
}
function closeSheet(id) { const el=document.getElementById(id); if(el) el.style.display='none'; }

// ═══════════════════════════════════════════════════
// CONFIRM DIALOG
// ═══════════════════════════════════════════════════
function showConfirm(msg, onOk) {
  const ov = document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9000;display:flex;align-items:center;justify-content:center;padding:24px';
  ov.innerHTML=`<div style="background:#161923;border-radius:20px;padding:24px;width:100%;max-width:300px;border:1px solid #2A2F45">
    <div style="font-size:16px;font-weight:700;color:#F1F5F9;margin-bottom:20px;text-align:center">${msg}</div>
    <div style="display:flex;gap:10px">
      <button id="cc-cancel" style="flex:1;padding:12px;border-radius:12px;border:none;background:#1E2235;color:#6B7A99;font-size:15px;font-weight:700;cursor:pointer">Abbrechen</button>
      <button id="cc-ok" style="flex:1;padding:12px;border-radius:12px;border:none;background:#F87171;color:#fff;font-size:15px;font-weight:700;cursor:pointer">Löschen</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  ov.querySelector('#cc-cancel').onclick=()=>document.body.removeChild(ov);
  ov.querySelector('#cc-ok').onclick=()=>{document.body.removeChild(ov);onOk();};
}

// ═══════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════
let _tt;
function showToast(msg,color=C.green) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.background=color; el.style.display='block';
  clearTimeout(_tt); _tt=setTimeout(()=>el.style.display='none',2200);
}

// ═══════════════════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════════════════
function exportData() {
  const blob=new Blob([JSON.stringify(S.profiles,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='budget-export.json'; a.click();
  URL.revokeObjectURL(url);
  showToast('Export erfolgreich ✓');
}

// ═══════════════════════════════════════════════════
// PWA
// ═══════════════════════════════════════════════════
if('serviceWorker' in navigator) {
  const sw=`const C='budget-v1';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll([self.location.pathname]))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'text/javascript'}))).catch(()=>{});
}

init();
</script>
